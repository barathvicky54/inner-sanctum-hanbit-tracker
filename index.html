<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inner Sanctum - Habit Tracker Portal</title>
    <style>
        :root {
            --primary-orange: #ff7426;
            --secondary-orange: #f04e23;
            --dark-slate: #1e293b;
        }

        /* Full page responsive setup */
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(rgba(20, 15, 10, 0.45), rgba(40, 20, 10, 0.65)), 
                        url('https://images.unsplash.com/photo-1518241353330-0f7941c2d9b5?q=80&w=1925&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Glassmorphic Login Card */
        .login-card {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(25px) saturate(160%);
            -webkit-backdrop-filter: blur(25px) saturate(160%);
            padding: 50px 45px;
            border-radius: 32px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.35), 
                        inset 0 1px 1px rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.15);
            text-align: center;
            width: 360px;
            z-index: 10;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Branding Aesthetics */
        .brand-logo {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, var(--primary-orange), var(--secondary-orange));
            border-radius: 22px;
            margin: 0 auto 24px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 12px 24px rgba(240, 78, 35, 0.4);
        }

        .brand-logo svg {
            width: 38px;
            height: 38px;
            fill: white;
        }

        .login-card h1 {
            margin: 0 0 10px 0;
            color: #ffffff;
            font-size: 30px;
            font-weight: 700;
            letter-spacing: -0.5px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }

        .login-card p {
            color: #e2e8f0;
            margin: 0 0 40px 0;
            font-size: 15px;
            line-height: 1.6;
            font-weight: 400;
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }

        /* Google Button Design */
        .google-btn {
            background-color: #ffffff;
            color: #1e293b;
            border: none;
            padding: 14px 24px;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .google-btn:hover {
            background-color: #f8fafc;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(240, 78, 35, 0.25);
        }

        .google-btn:active {
            transform: translateY(0);
        }

        .google-icon {
            width: 22px;
            height: 22px;
        }

        .footer-note {
            margin-top: 40px;
            font-size: 12px;
            color: #cbd5e1;
            letter-spacing: 0.5px;
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="brand-logo">
            <svg viewBox="0 0 24 24">
                <path d="M12,3C11.24,6.75 8,9 8,13C8,15.21 9.79,17 12,17C14.21,17 16,15.21 16,13C16,9 12.76,6.75 12,3M12,1C12,1 18,7 18,13C18,16.31 15.31,19 12,19C8.69,19 6,16.31 6,13C6,7 12,1 12,1Z"/>
            </svg>
        </div>
        <h1>Inner Sanctum</h1>
        <p>Your sanctuary for daily growth.<br>Sign in to track your habits.</p>
        
        <button id="googleLoginBtn" class="google-btn">
            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google Logo" class="google-icon">
            Continue with Google
        </button>

        <div class="footer-note">
            Secure Enterprise Encryption
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        
        // Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyAglWgvr7RFA48mGLVAeoknCG5FsRz985E",
            authDomain: "inner-sanctum-habbit-tracker.firebaseapp.com",
            projectId: "inner-sanctum-habbit-tracker",
            storageBucket: "inner-sanctum-habbit-tracker.firebasestorage.app",
            messagingSenderId: "1003791959497",
            appId: "1:1003791959497:web:fe0750a4d43788d34d5418",
            measurementId: "G-X157M9JW81"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        const loginBtn = document.getElementById('googleLoginBtn');

        loginBtn.addEventListener('click', () => {
            signInWithPopup(auth, provider)
                .then((result) => {
                    const user = result.user;
                    
                    // Admin List Array
                    const adminEmails = ["barathx8@gmail.com", "barathvignesh.r@gmail.com"]; 
                    
                    if (adminEmails.includes(user.email)) {
                        window.location.href = "admin.html"; 
                    } else {
                        window.location.href = "dashboard.html"; 
                    }
                })
                .catch((error) => {
                    console.error("Error signing in: ", error);
                    alert("Login failed! Please check your network.");
                });
        });
    </script>
</body>
</html>
